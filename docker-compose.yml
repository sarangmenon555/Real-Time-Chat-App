version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: relay_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: relay

  redis:
    image: redis:7-alpine
    container_name: relay_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: relay_server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/relay
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=relay_jwt_secret_change_in_prod
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: relay_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
    depends_on:
      - server

volumes:
  mongo_data:
